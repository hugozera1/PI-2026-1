# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - PI-PYTHON-5

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versão estável recomendada pela Azure

      # 🛠️ Entra na pasta do ML para criar a venv e instalar dependências
      - name: Create and Start virtual environment and Install dependencies
        run: |
          cd backend/ml
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # Faz o upload apenas do conteúdo de backend/ml para a raiz do container de deploy
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/ml
            !backend/ml/venv/
            !backend/ml/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2D3C66B920F6427B86A7EDD5D7F77622 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_11D3A5564C8E413C88DFD68FE335624A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C849DD30DA34416CAFCAAFEAA5219629 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'PI-PYTHON-5'
          slot-name: 'Production'
